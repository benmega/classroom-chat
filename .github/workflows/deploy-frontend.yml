name: Deploy Fallback to S3

on:
  push:
    branches:
      - deploy-gunicorn
  workflow_dispatch:

jobs:
  # Gates: deploy must not run unless both of these succeed.
  tests:
    uses: ./.github/workflows/tests.yml

  lint:
    uses: ./.github/workflows/lint.yml

  build-and-deploy-s3:
    needs: [tests, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Build Frontend
        env:
          VITE_API_URL: https://api-blossom.benmega.com
        run: |
          cd frontend
          npm install
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://blossom.benmega.com/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id E3VTOHKU7GPN72 --paths "/*"
