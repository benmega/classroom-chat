name: Deploy to EC2

on:
  push:
    branches:
      - deploy

jobs:
  # Gates: deploy must not run unless both of these succeed.
  tests:
    uses: ./.github/workflows/tests.yml

  lint:
    uses: ./.github/workflows/lint.yml

  build-and-deploy:
    needs: [tests, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: api-blossom.benmega.com
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR="$HOME/classroom-chat"
            
            # Update code (for backend and script changes)
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/deploy

            # Inject production environment variables
            cat > "$APP_DIR/backend/.env" <<ENVFILE
            FLASK_ENV=production
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            DATABASE_URL=sqlite:////home/ubuntu/classroom-chat/backend/instance/prod_users.db
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
            ENVFILE

            # Execute the deployment script
            chmod +x "$APP_DIR/deploy.sh"
            "$APP_DIR/deploy.sh"