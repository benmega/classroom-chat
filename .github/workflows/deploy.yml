name: Deploy to EC2

on:
  push:
    branches:
      - deploy-gunicorn

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR="$HOME/classroom-chat"

            # Inject all required production environment variables into backend/.env
            # These are stored as GitHub Secrets and never committed to the repository
            cat > "$APP_DIR/backend/.env" <<ENVFILE
            FLASK_ENV=production
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            DATABASE_URL=sqlite:////home/ubuntu/classroom-chat/backend/instance/prod_users.db
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
            ENVFILE

            # Execute the deployment script
            chmod +x "$APP_DIR/deploy.sh"
            "$APP_DIR/deploy.sh"