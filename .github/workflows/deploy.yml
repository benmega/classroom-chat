name: Deploy to EC2

on:
  push:
    branches:
      - deploy

jobs:
  # Gates: deploy must not run unless both of these succeed.
  tests:
    uses: ./.github/workflows/tests.yml

  lint:
    uses: ./.github/workflows/lint.yml

  build-and-deploy:
    needs: [tests, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: api-blossom.benmega.com
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR="$HOME/classroom-chat"
            
            # Update code (for backend and script changes)
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/deploy

            # Inject production environment variables
            {
              printf 'FLASK_ENV=production\n'
              printf 'SECRET_KEY=%s\n' '${{ secrets.SECRET_KEY }}'
              printf 'ADMIN_USERNAME=%s\n' '${{ secrets.ADMIN_USERNAME }}'
              printf 'ADMIN_PASSWORD=%s\n' '${{ secrets.ADMIN_PASSWORD }}'
              printf 'DATABASE_URL=sqlite:////home/ubuntu/classroom-chat/backend/instance/prod_users.db\n'
              printf 'OPENAI_API_KEY=%s\n' '${{ secrets.OPENAI_API_KEY }}'
              printf 'WEBHOOK_SECRET=%s\n' '${{ secrets.WEBHOOK_SECRET }}'
              printf 'COGNITO_REGION=%s\n' '${{ secrets.COGNITO_REGION }}'
              printf 'COGNITO_USER_POOL_ID=%s\n' '${{ secrets.COGNITO_USER_POOL_ID }}'
              printf 'COGNITO_CLIENT_ID=%s\n' '${{ secrets.COGNITO_CLIENT_ID }}'
              printf 'COGNITO_CLIENT_SECRET=%s\n' '${{ secrets.COGNITO_CLIENT_SECRET }}'
              printf 'COGNITO_DOMAIN=%s\n' '${{ secrets.COGNITO_DOMAIN }}'
              printf 'COGNITO_REDIRECT_URI=%s\n' '${{ secrets.COGNITO_REDIRECT_URI }}'
              printf 'AWS_ACCESS_KEY_ID=%s\n' '${{ secrets.AWS_ACCESS_KEY_ID }}'
              printf 'AWS_SECRET_ACCESS_KEY=%s\n' '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
            } > "$APP_DIR/backend/.env"

            # Execute the deployment script
            chmod +x "$APP_DIR/deploy.sh"
            "$APP_DIR/deploy.sh"
