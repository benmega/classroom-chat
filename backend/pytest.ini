[pytest]
pythonpath = .
# The real suite lives in tests/. Restricting collection there keeps pytest from
# picking up manual dev scripts named test_*.py (in scratch/ or at the backend
# root, e.g. test_move.py/test_db.py) that run create_app()/hit a live server at
# import time and break collection (e.g. SchedulerAlreadyRunningError).
testpaths = tests
norecursedirs = venv .venv scratch
addopts = --ignore=test_output.txt --ignore=test_results.txt
