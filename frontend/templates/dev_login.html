<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Login | Classroom Chat</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --error-color: #ef4444;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-container {
            width: 64px;
            height: 64px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--accent-color);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .status {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-card {
            display: none;
            background: rgba(127, 29, 29, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            text-align: left;
        }

        .error-title {
            color: var(--error-color);
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .error-message {
            color: rgba(248, 250, 252, 0.8);
            font-size: 0.8125rem;
            line-height: 1.5;
        }

        .footer-text {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(148, 163, 184, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="mainCard">
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m13 2-2 10h9L11 22l2-10H5Z"/>
                </svg>
            </div>
            <h1>Dev Login</h1>
            <p class="status" id="statusText">Authenticating as {{ role }}...</p>
            
            <div class="loader" id="loader"></div>

            <div class="error-card" id="errorCard">
                <div class="error-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    Authentication Failed
                </div>
                <div class="error-message" id="errorMessage"></div>
            </div>
        </div>
        <p class="footer-text">Development Environment Only</p>
    </div>

    <script>
        // Extract role and message from server-side context
        const role = "{{ role }}";
        const error = "{{ error }}";
        const redirectUrl = "{{ redirect_url }}";

        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const errorCard = document.getElementById('errorCard');
        const errorMessage = document.getElementById('errorMessage');

        if (error && error !== 'None' && error !== '') {
            statusText.style.display = 'none';
            loader.style.display = 'none';
            errorCard.style.display = 'block';
            errorMessage.textContent = error;
        } else {
            // Success state - redirect after a short delay to show the "Main App" feel
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 800);
        }
    </script>
</body>
</html>
