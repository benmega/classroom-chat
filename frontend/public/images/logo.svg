  <path d="M40,44.5 L40,50 Q50,55 60,50 L60,44.5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M65,42 L65,52" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
  <circle cx="65" cy="53" r="1.5" fill="white" />
</svg>
