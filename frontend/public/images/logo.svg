<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EB2BB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Chat Bubble -->
  <path d="M20,25 Q20,15 30,15 L70,15 Q80,15 80,25 L80,65 Q80,75 70,75 L45,75 L25,85 L25,75 Q20,75 20,65 Z" fill="url(#logoGradient)" filter="url(#glow)" />
